<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #5f2c82;
    padding: 12px 20px;
    color: white;
}

.logo {
    font-size: 18px;
    font-weight: bold;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

.nav-links a:hover {
    text-decoration: underline;
}

.nav-btn {
    background: #ff4d4d;
    border: none;
    padding: 7px 14px;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

/* Hero Section */
.hero {
    height: 80vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    margin-bottom: 20px;
}

.hero button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: black;
    cursor: pointer;
}

/* Sections */
.section {
    padding: 40px;
    text-align: center;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Expense Tracker</div>

    <div class="nav-links">
        <a href="#">About</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="transaction.html">Add</a>
        <a href="transactionhistory.html">History</a>
        <a href="chart.html">Reports</a>
        <a href="profile.html">Profile</a>
    </div>

    <div id="authArea">
        <a href="tracker.html"><button class="nav-btn">Login</button></a>
    </div>
</div>

<!-- Hero -->
<div class="hero">
    <h1>Track Your Expenses Easily</h1>
    <p>Manage your income, expenses, and savings in one place</p>
    <button onclick="goToDashboard()">Get Started</button>
</div>

<!-- About Section -->
<div class="section">
    <h2>About This App</h2>
    <p>This expense tracker helps you manage your daily spending, track income, and analyze your financial habits.</p>
</div>

<script>
/* Redirect */
function goToDashboard() {
    window.location.href = "dashboard.html";
}

/* Check login state */
let user = localStorage.getItem("currentUser");

if (user) {
    document.getElementById("authArea").innerHTML =
        '<button class="nav-btn" onclick="logout()">Logout</button>';
}

/* Logout */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}
</script>

</body>
</html>
