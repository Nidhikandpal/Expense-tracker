<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports & Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* NEW BACKGROUND (light & professional) */
body {
    background: linear-gradient(135deg, #e0f7fa, rgb(255, 192, 203));
}

/* HEADER UPDATED */
.header {
    text-align: center;
    color: black;
    padding: 25px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Container */
.container {
    max-width: 600px;
    margin: 10px auto;
}

/* Cards */
.card {
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* Colorful Cards */
.bar-card {
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
}

.pie-card {
    background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
}

/* Titles */
h3 {
    margin-bottom: 10px;
    text-align: center;
    color: #333;
}

/* Canvas size */
canvas {
    max-height: 250px;
}
</style>

</head>

<body>

<div class="header">REPORTS & ANALYTICS</div>

<div class="container">

    <div class="card bar-card">
        <h3>Monthly Expenses</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="card pie-card">
        <h3>Category Spending</h3>
        <canvas id="pieChart"></canvas>
    </div>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

/* Monthly Data */
let monthlyData = {};
transactions.forEach(t => {
    if (t.type === "Expense") {
        let month = t.date.slice(0,7);
        monthlyData[month] = (monthlyData[month] || 0) + Number(t.amount);
    }
});

/* Category Data */
let categoryData = {};
transactions.forEach(t => {
    if (t.type === "Expense") {
        categoryData[t.category] = (categoryData[t.category] || 0) + Number(t.amount);
    }
});

/* Bar Chart */
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: Object.keys(monthlyData),
        datasets: [{
            data: Object.values(monthlyData)
        }]
    }
});

/* Pie Chart */
new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: Object.keys(categoryData),
        datasets: [{
            data: Object.values(categoryData)
        }]
    }
});

</script>

</body>
</html>
