<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Transaction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6f9;
}

/* Header */
.header {
    background: #5f2c82;
    color: white;
    padding: 15px 30px;
    font-size: 20px;
}

/* Container */
.container {
    max-width: 500px;
    margin: 40px auto;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    margin-bottom: 20px;
}

/* Form */
.form-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus, select:focus, textarea:focus {
    border-color: #5f2c82;
}

/* Buttons */
.btn-group {
    display: flex;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

.income {
    background: #28a745;
    color: white;
}

.expense {
    background: #dc3545;
    color: white;
}

/* Message */
#msg {
    margin-top: 10px;
    color: green;
    text-align: center;
}
</style>

</head>

<body>

<div class="header">Add Transaction</div>

<div class="container">
    <div class="card">
        <h2>New Transaction</h2>

        <form id="form">

            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="amount" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="">Select</option>
                    <option>Food</option>
                    <option>Travel</option>
                    <option>Shopping</option>
                    <option>Salary</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="notes"></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="btn income" onclick="addTransaction('Income')">Add Income</button>
                <button type="button" class="btn expense" onclick="addTransaction('Expense')">Add Expense</button>
            </div>

        </form>

        <div id="msg"></div>

    </div>
</div>

<script>
function addTransaction(type) {
    const amount = document.getElementById("amount").value;
    const category = document.getElementById("category").value;
    const date = document.getElementById("date").value;
    const notes = document.getElementById("notes").value;

    if (!amount || !category || !date) {
        alert("Please fill all required fields");
        return;
    }

    const transaction = {
        type,
        amount,
        category,
        date,
        notes
    };

    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
    transactions.push(transaction);
    localStorage.setItem("transactions", JSON.stringify(transactions));

    document.getElementById("msg").innerText = type + " added successfully!";

    document.getElementById("form").reset();
}
</script>

</body>
</html>
