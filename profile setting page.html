<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="profilesetting.css" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Settings</h2>
        <ul class="menu">
    <li onclick="goToProfile()">Profile</li>
    <li class="active">Password</li>
</ul>
    </div>

    <!-- Content -->
    <div class="content">
        <h2>Password</h2>
        <p>Manage settings for your account passwords</p>

        <div class="form-group">
            <label>Current password</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>New password</label>
            <input type="password">
        </div>

        <div class="form-group">
            <label>Confirm new password</label>
            <input type="password">
        </div>

        <div class="actions">
            <button class="btn cancel">Cancel</button>
            <button class="btn update">Update password</button>
        </div>
    </div>

</div>

</body>
</html>
