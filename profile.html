<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #eef2f7;
}

/* Layout */
.container {
    width: 900px;
    margin: 40px auto;
    display: flex;
    gap: 20px;
}

/* LEFT PROFILE CARD */
.profile-card {
    width: 280px;
    background: white;
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Avatar */
.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #5f2c82;
    color: white;
    font-size: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
}

.profile-card h3 {
    margin-bottom: 5px;
}

.profile-card p {
    color: gray;
}

/* RIGHT FORM */
.form-section {
    flex: 1;
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.form-section h2 {
    margin-bottom: 20px;
}

/* Inputs */
.form-group {
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Button */
.btn {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 6px;
    background: #5f2c82;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
    color: green;
}
</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="profile-card">
        <div class="avatar" id="avatar">U</div>
        <h3 id="displayName">User Name</h3>
        <p id="displayEmail">email@example.com</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="form-section">
        <h2>Edit Profile</h2>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <button class="btn" onclick="saveProfile()">Save Changes</button>

<!-- NEW BUTTON -->
<a href="profile setting page.html">
    <button class="btn settings-btn">Profile Settings</button>
</a>

<div id="msg"></div>
    </div>

</div>

<script>
function loadProfile() {
    let user = JSON.parse(localStorage.getItem("currentUser")) || {};

    document.getElementById("name").value = user.name || "";
    document.getElementById("email").value = user.email || "";

    document.getElementById("displayName").innerText = user.name || "User Name";
    document.getElementById("displayEmail").innerText = user.email || "email@example.com";

    let letter = user.name ? user.name.charAt(0).toUpperCase() : "U";
    document.getElementById("avatar").innerText = letter;
}

function saveProfile() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    let user = { name, email };

    localStorage.setItem("currentUser", JSON.stringify(user));

    document.getElementById("msg").innerText = "Profile updated!";

    loadProfile();
}

loadProfile();
</script>

</body>
</html>
